{% extends "layout.html" %}

{% block container %}
<div class="flex flex-col items-center justify-center min-h-screen">
    <div class="bg-neutral-primary-soft p-8 rounded-lg shadow-md text-center max-w-2xl">
        <h1 class="text-4xl font-bold text-heading mb-4">Bienvenido al Sistema Escolar</h1>
        <p class="text-body text-lg mb-6">Sistema de gestión de alumnos, maestros y cursos</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <a href="{{ url_for('alumnos.indexA') }}" class="bg-blue-500 text-gray-700 p-6 rounded-lg hover:bg-blue-600 transition">
                <h2 class="text-xl font-semibold mb-2">Alumnos</h2>
                <p>Gestión de alumnos</p>
            </a>
            <a href="{{ url_for('maestros.indexM') }}" class="bg-green-500 text-gray-700 p-6 rounded-lg hover:bg-green-600 transition">
                <h2 class="text-xl font-semibold mb-2">Maestros</h2>
                <p>Gestión de maestros</p>
            </a>
            <a href="{{ url_for('cursos.indexC') }}" class="bg-purple-500 text-gray-700 p-6 rounded-lg hover:bg-purple-600 transition">
                <h2 class="text-xl font-semibold mb-2">Cursos</h2>
                <p>Gestión de cursos</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
